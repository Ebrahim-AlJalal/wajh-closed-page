  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
  
  <style>
    /* Design Variables */
    :root {
      --primary-color: #601a2e; /* Burgundy accent matching the dots in the logo */
      --text-dark: #1e1e24;
      --text-muted: #5e646e;
      --bg-gradient: linear-gradient(135deg, #fefefe 0%, #f4f5f8 100%);
      --card-bg: rgba(255, 255, 255, 0.45);
      --card-border: rgba(255, 255, 255, 0.6);
      --card-shadow: 0 30px 60px rgba(0, 0, 0, 0.02);
      --font-en: 'Outfit', sans-serif;
      --font-ar: 'Tajawal', sans-serif;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      background: #fafafa;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      color: var(--text-dark);
      padding: 24px;
    }
    
    /* Background wave container */
    .background-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      overflow: hidden;
      background: var(--bg-gradient);
    }
    
    /* Optimized Hardware-Accelerated Wave Wrappers */
    .wave-wrapper {
      position: absolute;
      width: 200%;
      left: 0;
      will-change: transform;
      pointer-events: none;
    }
    
    /* Shifted bottom to adjust wave heights and overlapping */
    .wave-wrapper-1 {
      height: 60%;
      bottom: -15%;
      opacity: 0.6;
      animation: wave-flow-left 32s infinite linear;
    }
    
    .wave-wrapper-2 {
      height: 55%;
      bottom: -18%;
      opacity: 0.45;
      animation: wave-flow-right 24s infinite linear;
    }
    
    .wave-wrapper-3 {
      height: 50%;
      bottom: -12%;
      opacity: 0.85;
      animation: wave-flow-left 18s infinite linear;
    }
    
    .wave-svg {
      width: 100%;
      height: 100%;
    }
    
    /* GPU-friendly translation keyframes */
    @keyframes wave-flow-left {
      0% {
        transform: translate3d(0, 0, 0);
      }
      100% {
        transform: translate3d(-50%, 0, 0);
      }
    }
    
    @keyframes wave-flow-right {
      0% {
        transform: translate3d(-50%, 0, 0);
      }
      100% {
        transform: translate3d(0, 0, 0);
      }
    }
    
    /* Main Content Card */
    .card {
      background: var(--card-bg);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border: 1px solid var(--card-border);
      border-radius: 36px;
      padding: 60px 48px;
      width: 100%;
      max-width: 580px;
      text-align: center;
      box-shadow: var(--card-shadow);
      position: relative;
      z-index: 10;
      opacity: 0;
      transform: translateY(40px) scale(0.96);
      animation: card-enter 1.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      animation-delay: 0.4s;
    }
    
    @keyframes card-enter {
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
    
    /* Logo Container with sequential animation */
    .logo-wrapper {
      position: relative;
      width: 155px;
      height: 155px;
      margin: 0 auto 35px auto;
      opacity: 0;
      transform: scale(0.5) rotate(-5deg);
      animation: logo-enter 1.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      animation-delay: 1.2s;
    }
    
    .logo-container {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: #ffffff;
      padding: 6px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.05), 0 2px 8px rgba(0, 0, 0, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.8);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.5s ease;
    }
    
    .logo-container:hover {
      transform: translateY(-8px) scale(1.05) rotate(2deg);
      box-shadow: 0 24px 48px rgba(96, 26, 46, 0.12), 0 4px 12px rgba(0, 0, 0, 0.03);
    }
    
    .logo-container img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
    }
    
    @keyframes logo-enter {
      to {
        opacity: 1;
        transform: scale(1) rotate(0deg);
      }
    }
    
    /* Typography Styles */
    .titles-group {
      margin-bottom: 35px;
    }
    
    .title-en {
      font-family: var(--font-en);
      font-size: 1.65rem;
      font-weight: 500;
      color: var(--text-dark);
      letter-spacing: -0.6px;
      margin-bottom: 12px;
      line-height: 1.35;
      opacity: 0;
      transform: translateY(20px);
      animation: element-fade-slide 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      animation-delay: 1.8s;
    }
    
    .title-ar {
      font-family: var(--font-ar);
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--text-dark);
      line-height: 1.45;
      direction: rtl;
      opacity: 0;
      transform: translateY(20px);
      animation: element-fade-slide 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      animation-delay: 2.1s;
    }
    
    .divider {
      width: 60px;
      height: 3px;
      background: var(--primary-color);
      margin: 30px auto;
      border-radius: 4px;
      opacity: 0;
      transform: scaleX(0);
      animation: divider-expand 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      animation-delay: 2.3s;
    }
    
    .instagram-notice {
      margin-bottom: 35px;
    }
    
    .notice-en {
      font-family: var(--font-en);
      font-size: 1.15rem;
      font-weight: 400;
      color: var(--text-muted);
      margin-bottom: 6px;
      letter-spacing: -0.2px;
      opacity: 0;
      transform: translateY(15px);
      animation: element-fade-slide 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      animation-delay: 2.5s;
    }
    
    .notice-ar {
      font-family: var(--font-ar);
      font-size: 1.15rem;
      font-weight: 500;
      color: var(--text-muted);
      direction: rtl;
      opacity: 0;
      transform: translateY(15px);
      animation: element-fade-slide 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      animation-delay: 2.7s;
    }
    
    /* Instagram Action Button */
    .instagram-link-wrapper {
      opacity: 0;
      transform: translateY(15px);
      animation: element-fade-slide 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      animation-delay: 3s;
      display: inline-block;
    }
    
    .instagram-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: #ffffff;
      border: 1px solid rgba(0, 0, 0, 0.06);
      padding: 15px 32px;
      border-radius: 100px;
      text-decoration: none;
      color: var(--text-dark);
      font-family: var(--font-en);
      font-size: 1.15rem;
      font-weight: 500;
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.02);
      transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
      overflow: hidden;
      z-index: 1;
    }
    
    .instagram-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
      opacity: 0;
      z-index: -1;
      transition: opacity 0.5s ease;
      border-radius: 100px;
    }
    
    .instagram-btn:hover {
      color: #ffffff;
      transform: translateY(-4px);
      box-shadow: 0 12px 28px rgba(220, 39, 67, 0.22);
      border-color: transparent;
    }
    
    .instagram-btn:hover::before {
      opacity: 1;
    }
    
    .instagram-btn svg {
      transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1), fill 0.5s ease;
      fill: var(--text-dark);
    }
    
    .instagram-btn:hover svg {
      transform: rotate(12deg) scale(1.15);
      fill: #ffffff;
    }
    
    /* Animation Keyframes */
    @keyframes element-fade-slide {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    @keyframes divider-expand {
      to {
        opacity: 1;
        transform: scaleX(1);
      }
    }
    
    /* Responsive Adaptations */
    @media (max-width: 580px) {
      body {
        padding: 16px;
      }
      .card {
        padding: 45px 28px;
        border-radius: 28px;
      }
      .logo-wrapper {
        width: 130px;
        height: 130px;
        margin-bottom: 25px;
      }
      .title-en {
        font-size: 1.35rem;
      }
      .title-ar {
        font-size: 1.45rem;
      }
      .notice-en, .notice-ar {
        font-size: 1.05rem;
      }
      .instagram-btn {
        padding: 13px 26px;
        font-size: 1.05rem;
      }
    }
  </style>
</head>
<body>
  <!-- Full Screen Flowing Background Waves -->
